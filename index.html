<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            background-color: #0f172a;
            color: #cbd5e1;
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            color: #38bdf8;
            font-weight: 900;
        }
        p {
            font-size: 1.25rem;
            margin: 10px 0 30px;
            color: #94a3b8;
        }
        .btn {
            background-color: #38bdf8;
            color: #0f172a;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #7dd3fc;
        }
    </style>
</head>
<body>

    <h1>404</h1>
    <p>Whoops! This page doesn't exist (or was overwritten by a giant wall of text).</p>
    <a href="https://about.mohsunov.com" class="btn">Take Me Home</a>

</body>
</html>
